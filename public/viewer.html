<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Viewer - Gemini CLI WebUI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="viewer.css">
</head>
<body>
    <div id="viewer-header">
        <span id="file-path" style="flex:1;">Loading...</span>
        <div style="flex:1; text-align:center;">
            <button id="swap-panes-btn" title="Swap Left/Right Panes" class="hidden" style="background:#555; padding:4px 12px; font-weight:bold;">⇄ Swap</button>
        </div>
        <div class="header-buttons" style="flex:1; text-align:right;">
            <button id="edit-btn" class="hidden" style="background-color:#0e639c; color:white; border:none; padding:4px 10px; cursor:pointer; font-weight:bold; margin-right:5px; border-radius:3px;">Edit</button>
            <button id="open-btn">Open</button>
            <button onclick="window.close()">Close</button>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden" style="z-index: 2001;">
        <div class="modal-content" style="width: 95%; height: 95%; max-width: 1600px; display: flex; flex-direction: column; background-color: #1e1e1e; padding: 0; border: 1px solid #454545;">
            <div class="modal-header" style="background-color: #2d2d2d; color: white; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #3c3c3c;">
                <span id="edit-file-path" style="font-family: monospace; color: #ce9178; font-weight: bold;">Editing...</span>
                <div class="modal-controls">
                    <button id="edit-save-btn" style="background-color: #0e639c; color: white; border: none; padding: 6px 16px; cursor: pointer; border-radius: 3px; font-weight: bold; margin-right: 10px;">Save</button>
                    <button id="edit-cancel-btn" style="background-color: #555; color: white; border: none; padding: 6px 16px; cursor: pointer; border-radius: 3px;">Cancel</button>
                </div>
            </div>
            <div style="flex: 1; display: flex; padding: 0; background: #1e1e1e;">
                <textarea id="edit-textarea" spellcheck="false" style="width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; border: none; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; padding: 15px; resize: none; outline: none; box-sizing: border-box; line-height: 1.5;"></textarea>
            </div>
        </div>
    </div>

    <!-- File Browser Modal -->
    <div id="file-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-current-dir">Loading...</span>
                <div class="modal-controls">
                    <button id="modal-close-btn">&times;</button>
                </div>
            </div>
            <div class="modal-list-header">
                <div class="col-name" id="sort-name">Name <span class="sort-icon"></span></div>
                <div class="col-date" id="sort-date">Date <span class="sort-icon">▼</span></div>
            </div>
            <ul id="modal-file-list">
                <!-- File list items will be injected here -->
            </ul>
        </div>
    </div>

    <!-- Mermaid Modal -->
    <div id="mermaid-modal" class="modal hidden" style="z-index: 2000;">
        <div class="modal-content" style="width: 95%; height: 95%; max-width: 1600px; display: flex; flex-direction: column; background-color: #ffffff;">
            <div class="modal-header" style="background-color: #333; color: white; display: flex; justify-content: space-between; align-items: center; padding: 5px 15px;">
                <span style="font-weight: bold;">Mermaid Diagram Renderer</span>
                
                <!-- 줌 컨트롤 버튼 -->
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="btn-zoom-out" style="padding: 4px 10px; cursor: pointer; background: #555; color: white; border: 1px solid #777; border-radius: 3px;">➖ Zoom Out</button>
                    <span id="zoom-level" style="font-size: 14px; min-width: 40px; text-align: center;">100%</span>
                    <button id="btn-zoom-in" style="padding: 4px 10px; cursor: pointer; background: #555; color: white; border: 1px solid #777; border-radius: 3px;">➕ Zoom In</button>
                    <button id="btn-zoom-reset" style="padding: 4px 10px; cursor: pointer; background: #555; color: white; border: 1px solid #777; border-radius: 3px; margin-left: 5px;">Reset</button>
                </div>
                
                <div class="modal-controls">
                    <button id="mermaid-close-btn" style="color: white; background: transparent; border: none; font-size: 28px; cursor: pointer; margin-left: 20px;">&times;</button>
                </div>
            </div>
            <div id="mermaid-render-container" style="flex: 1; overflow: auto; padding: 20px; background: white; text-align: center; position: relative;">
                <style>
                    /* Mermaid SVG가 컨테이너 내에서 기본 크기를 잡도록 함 */
                    .mermaid svg { 
                        height: auto !important;
                        min-width: 600px;
                        transition: transform 0.2s ease-out; /* 줌 애니메이션 효과 */
                        transform-origin: top center; /* 상단 중앙을 기준으로 줌 */
                    }
                </style>
                <!-- 렌더링된 다이어그램이 들어갈 위치 -->
            </div>
        </div>
    </div>

    <script>
        // 전역으로 접근 가능한 Mermaid 렌더링 함수
        window.showMermaidModal = function(code) {
            const modal = document.getElementById('mermaid-modal');
            const container = document.getElementById('mermaid-render-container');
            const closeBtn = document.getElementById('mermaid-close-btn');
            
            // 줌 관련 변수 및 요소
            let currentZoom = 1.0;
            const btnZoomIn = document.getElementById('btn-zoom-in');
            const btnZoomOut = document.getElementById('btn-zoom-out');
            const btnZoomReset = document.getElementById('btn-zoom-reset');
            const zoomLevelTxt = document.getElementById('zoom-level');

            if (modal && container && window.mermaid) {
                // 초기화: 반응형 옵션 활성화
                window.mermaid.initialize({ 
                    startOnLoad: false, 
                    theme: 'default', 
                    securityLevel: 'loose',
                    flowchart: { useMaxWidth: false, htmlLabels: true },
                    sequence: { useMaxWidth: false },
                    themeVariables: { fontSize: '16px' }
                });

                // 모달 띄우기
                modal.classList.remove('hidden');
                modal.style.display = 'block';

                // 내부 초기화 및 대상 생성
                container.innerHTML = '';
                const diagDiv = document.createElement('div');
                diagDiv.className = 'mermaid';
                diagDiv.textContent = code;
                container.appendChild(diagDiv);

                // 렌더링
                try {
                    window.mermaid.init(undefined, diagDiv);
                } catch (e) {
                    console.error('[VIEWER] Mermaid Error:', e);
                    container.innerHTML = `<div style="color: red; padding: 20px;">Failed to render diagram:<br/><pre style="text-align: left;">${e.message}</pre></div>`;
                }

                // 줌 적용 함수
                const applyZoom = () => {
                    const svg = container.querySelector('svg');
                    if (svg) {
                        svg.style.transform = `scale(${currentZoom})`;
                        zoomLevelTxt.textContent = `${Math.round(currentZoom * 100)}%`;
                    }
                };

                // 줌 리스너 등록 (기존 리스너 덮어쓰기를 위해 cloneNode 기법이나 이벤트 직접 바인딩)
                btnZoomIn.onclick = () => { currentZoom += 0.2; applyZoom(); };
                btnZoomOut.onclick = () => { currentZoom = Math.max(0.2, currentZoom - 0.2); applyZoom(); };
                btnZoomReset.onclick = () => { currentZoom = 1.0; applyZoom(); };

                // 초기 줌 상태 반영
                setTimeout(applyZoom, 100);

                // 닫기 버튼 이벤트
                closeBtn.onclick = () => {
                    modal.classList.add('hidden');
                    modal.style.display = 'none';
                    container.innerHTML = '';
                    currentZoom = 1.0; // 상태 초기화
                };
            }
        };
    </script>

    <div id="main-container">
        <!-- 일반 텍스트용 컨테이너 -->
        <div id="text-container" class="full-view hidden">
            <div class="pane-header">
                <div class="pane-title">Raw Text</div>
                <div class="pane-controls">
                    <button class="copy-btn" id="copy-text-btn">Copy</button>
                    <button class="copy-btn print-btn" title="Print this document">Print</button>
                    <button class="copy-btn pdf-btn" title="Export as PDF (via Print)">PDF</button>
                </div>
            </div>
            <pre><code id="text-content"></code></pre>
        </div>

        <!-- 마크다운 분할 뷰용 컨테이너 -->
        <div id="markdown-container" class="split-view hidden">
            <div class="pane left">
                <div class="pane-header">
                    <div class="pane-title">Raw Markdown</div>
                    <button class="copy-btn" id="copy-raw-btn">Copy</button>
                </div>
                <pre><code id="md-raw"></code></pre>
            </div>
            <div class="pane right">
                <div class="pane-header">
                    <div class="pane-title">Rendered View</div>
                    <div class="pane-controls">
                        <button class="copy-btn" id="copy-rendered-btn">Copy</button>
                        <button class="copy-btn print-btn" title="Print this document">Print</button>
                        <button class="copy-btn pdf-btn" title="Export as PDF (via Print)">PDF</button>
                    </div>
                </div>
                <div id="md-rendered" class="markdown-body"></div>
            </div>
        </div>
    </div>

    <script src="socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- 캐시 방지를 위해 서버사이드 혹은 빌드 타임에 처리하는 것이 좋으나, 임시로 쿼리 스트링 활용 -->
    <script type="module" src="viewer.js?v=260405-1200"></script>
</body>
</html>
